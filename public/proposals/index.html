<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proposals — Jonathan Lyn-Shue</title>
  <link rel="icon" href="/favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f2440, #1e3a5f, #2d5a8e);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #1a1a2e;
    }

    .card {
      width: 100%;
      max-width: 400px;
      margin: 1.5rem;
      background: #ffffff;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      text-align: center;
    }

    .icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 1.25rem;
      background: #f0f4f8;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon svg {
      width: 28px;
      height: 28px;
      stroke: #2d5a8e;
    }

    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #6b7280;
      line-height: 1.5;
      margin-bottom: 1.75rem;
    }

    .code-input-group {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .code-digit {
      width: 56px;
      height: 64px;
      text-align: center;
      font-size: 1.5rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      color: #1a1a2e;
      background: #fafbfc;
    }

    .code-digit:focus {
      border-color: #2d5a8e;
      box-shadow: 0 0 0 3px rgba(45, 90, 142, 0.15);
      background: #fff;
    }

    .code-digit.error {
      border-color: #ef4444;
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
    }

    .btn {
      width: 100%;
      padding: 14px 24px;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      color: #ffffff;
      background: linear-gradient(135deg, #1e3a5f, #2d5a8e);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn:hover { opacity: 0.92; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      color: #ef4444;
      font-size: 0.85rem;
      font-weight: 500;
      margin-top: 1rem;
      min-height: 1.2em;
      transition: opacity 0.2s;
    }

    .footer {
      margin-top: 1.5rem;
      font-size: 0.78rem;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
      </svg>
    </div>

    <h1>Access Proposals</h1>
    <p class="subtitle">Enter the 4-digit code provided to you to view your confidential proposal materials.</p>

    <div class="code-input-group">
      <input type="text" class="code-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off" aria-label="Digit 1">
      <input type="text" class="code-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off" aria-label="Digit 2">
      <input type="text" class="code-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off" aria-label="Digit 3">
      <input type="text" class="code-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off" aria-label="Digit 4">
    </div>

    <button class="btn" id="submitBtn" disabled>
      <span class="spinner" id="spinner"></span>
      <span id="btnText">Continue</span>
    </button>

    <div class="error-msg" id="errorMsg"></div>

    <div class="footer">Secured access &mdash; Jonathan Lyn-Shue</div>
  </div>

  <script>
    var API_BASE = 'https://clients.jonathanlynshue.com';
    var digits = document.querySelectorAll('.code-digit');
    var submitBtn = document.getElementById('submitBtn');
    var spinner = document.getElementById('spinner');
    var btnText = document.getElementById('btnText');
    var errorMsg = document.getElementById('errorMsg');

    // Auto-focus and auto-advance
    digits.forEach(function(input, i) {
      input.addEventListener('input', function() {
        this.value = this.value.replace(/[^0-9]/g, '');
        if (this.value && i < digits.length - 1) {
          digits[i + 1].focus();
        }
        updateButton();
        clearError();
      });

      input.addEventListener('keydown', function(e) {
        if (e.key === 'Backspace' && !this.value && i > 0) {
          digits[i - 1].focus();
        }
        if (e.key === 'Enter') {
          submitBtn.click();
        }
      });

      // Handle paste
      input.addEventListener('paste', function(e) {
        e.preventDefault();
        var text = (e.clipboardData || window.clipboardData).getData('text').replace(/[^0-9]/g, '');
        for (var j = 0; j < Math.min(text.length, digits.length - i); j++) {
          digits[i + j].value = text[j];
        }
        var lastFilled = Math.min(i + text.length, digits.length) - 1;
        if (lastFilled < digits.length - 1) {
          digits[lastFilled + 1].focus();
        } else {
          digits[lastFilled].focus();
        }
        updateButton();
      });
    });

    digits[0].focus();

    function getCode() {
      return Array.from(digits).map(function(d) { return d.value; }).join('');
    }

    function updateButton() {
      submitBtn.disabled = getCode().length !== 4;
    }

    function clearError() {
      errorMsg.textContent = '';
      digits.forEach(function(d) { d.classList.remove('error'); });
    }

    function showError(msg) {
      errorMsg.textContent = msg;
      digits.forEach(function(d) { d.classList.add('error'); });
    }

    function setLoading(loading) {
      submitBtn.disabled = loading;
      spinner.style.display = loading ? 'block' : 'none';
      btnText.textContent = loading ? 'Verifying...' : 'Continue';
    }

    submitBtn.addEventListener('click', async function() {
      var code = getCode();
      if (code.length !== 4) return;

      clearError();
      setLoading(true);

      try {
        var resp = await fetch(API_BASE + '/api/verify-code', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code: code }),
        });

        var data = await resp.json();

        if (data.success && data.token) {
          window.location.href = API_BASE + '/zipforms?proposal_token=' + encodeURIComponent(data.token);
        } else {
          setLoading(false);
          showError(data.error || 'Invalid access code');
        }
      } catch (e) {
        setLoading(false);
        showError('Unable to verify. Please try again.');
      }
    });
  </script>
</body>
</html>
